// Preset exercise entries are either a plain id string or { id, duration }

const resolveEntry = (entry) => {
  const ex = byId(typeof entry === "string" ? entry : entry.id);
  if (!ex) return null;
  return typeof entry === "string" || entry.duration == null

    : { ...ex, duration: entry.duration };

// Normalization: lowercase, strip niqqud, fold Hebrew final letters, drop
// punctuation — so "לחיצת-חזה" matches "לחיצת חזה" and "bnch" matches "bench".
const HEB_FINALS = { "ך": "כ", "ם": "מ", "ן": "נ", "ף": "פ", "ץ": "צ" };
const normalizeSearch = (s) =>
  (s || "")
    .toLowerCase()
    .replace(/[֑-ׇ]/g, "")
    .replace(/[ךםןףץ]/g, (c) => HEB_FINALS[c])
    .replace(/[^a-z0-9א-ת]+/g, " ")
    .trim();

// Precomputed haystack per exercise: English + Hebrew names, aliases, group.
GYM_EXERCISES.forEach((ex) => {
  ex.search = normalizeSearch(
    ex.name + " " + ex.he + " " + (ex.alt || "") + " " + ex.group + " " + (GYM_GROUP_HE[ex.group] || "")
  );
});

function editDistCapped(a, b, cap) {
  if (Math.abs(a.length - b.length) > cap) return cap + 1;
  let prev = [];
  for (let j = 0; j <= b.length; j++) prev[j] = j;
  for (let i = 1; i <= a.length; i++) {
    const cur = [i];
    let rowMin = i;
    for (let j = 1; j <= b.length; j++) {
      cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
      if (cur[j] < rowMin) rowMin = cur[j];
    }
    if (rowMin > cap) return cap + 1;
    prev = cur;
  }
  return prev[b.length];
}

const isSubseq = (q, t) => {
  let i = 0;
  for (let j = 0; j < t.length && i < q.length; j++) if (t[j] === q[i]) i++;
  return i === q.length;
};

// Score a query against a normalized haystack. 0 = no match. Every query
// token must match some word (exact / prefix / substring / ≤2 typos /
// subsequence); whole-phrase substring matches rank highest.
function fuzzyScore(query, hay) {
  const q = normalizeSearch(query);
  if (!q) return 0;
  const idx = hay.indexOf(q);
  if (idx !== -1) return 1000 - idx * 2 - hay.length * 0.1;
  const qc = q.replace(/ /g, "");
  if (qc.length >= 3) {
    const ci = hay.replace(/ /g, "").indexOf(qc);
    if (ci !== -1) return 800 - ci * 2;
  }
  const words = hay.split(" ");
  let total = 0;
  for (const tok of q.split(" ")) {
    let best = 0;
    for (const w of words) {
      let s = 0;
      if (w === tok) s = 100;
      else if (w.indexOf(tok) === 0) s = 80;
      else if (tok.length >= 3 && w.indexOf(tok) !== -1) s = 60;
      else if (tok.length >= 4) {
        const cap = tok.length >= 7 ? 2 : 1;
        const d = Math.min(
          editDistCapped(tok, w, cap),
          editDistCapped(tok, w.slice(0, Math.min(w.length, tok.length + 1)), cap)
        );
        if (d <= cap) s = 55 - d * 15;
        else if (tok.length >= 5 && isSubseq(tok, w)) s = 25;
      }
      if (s > best) best = s;
    }
    if (best === 0) return 0;
    total += best;
  }
  return total;
}

const MERGE_FLAG_PREFIX = "abs-timer-merged-"; // + uid: local→cloud merge done on this device
const LOCAL_DIRTY_KEY = "abs-timer-local-dirty"; // signed-out writes force a re-merge

// True only when the SDK loaded (gstatic reachable) AND a real config was

// ---- Persistence adapter ----
// Local layer: Claude's artifact storage when available (persists across
// sessions on claude.ai), else the browser's localStorage.
const localGet = async (key) => {
  if (typeof window !== "undefined" && window.storage) {
    try {
      const r = await window.storage.get(key);
      return r && r.value != null ? r.value : null;
    } catch (e) {
      return null; // key doesn't exist yet
    }
  }
  try {
    return window.localStorage.getItem(key);
  } catch (e) {
    return null;
  }
};
const localSet = async (key, value) => {
  if (typeof window !== "undefined" && window.storage) {
    try {
      await window.storage.set(key, value);
      return true;
    } catch (e) {
      /* fall through to localStorage */
    }
  }
  try {
    window.localStorage.setItem(key, value);
    return true;
  } catch (e) {
    return false;
  }
};

// Cloud layer: per-user Firestore docs users/{uid}/data/{key} → { value, updatedAt }.
const cloudUid = () => {
  try {
    const u = firebaseReady ? firebase.auth().currentUser : null;
    return u ? u.uid : null;
  } catch (e) {
    return null;
  }
};
const cloudDoc = (uid, key) =>
  firebase.firestore().collection("users").doc(uid).collection("data").doc(key);

// The store decides cloud vs local itself, so call sites stay unchanged.
// Writes go local-first (never lost, never block the UI), then push to
// Firestore fire-and-forget — an offline Firestore set() doesn't resolve
// until reconnect, so it must not be awaited on the save path.
const store = {
  notify: null, // set by the component: ("syncing"|"synced"|"error") => void
  async get(key) {
    const uid = cloudUid();
    if (uid) {
      try {
        const snap = await cloudDoc(uid, key).get();
        if (snap.exists && snap.data().value != null) {
          const v = snap.data().value;
          await localSet(key, v); // mirror down so sign-out keeps current data
          return v;
        }
      } catch (e) {
        /* cloud unreachable — fall through to local */
      }
    }
    return localGet(key);
  },
  async set(key, value) {
    const ok = await localSet(key, value);
    const uid = cloudUid();
    if (uid) {
      if (store.notify) store.notify("syncing");
      try {
        cloudDoc(uid, key)
          .set({ value: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
          .then(() => {
            if (store.notify) store.notify("synced");
          })
          .catch((e) => {
            // permission-denied = the DB refused us (security rules), not a
            // connectivity problem — surface it distinctly so it's actionable.
            if (store.notify)
              store.notify(e && e.code === "permission-denied" ? "denied" : "error");
          });
      } catch (e) {
        if (store.notify) store.notify(e && e.code === "permission-denied" ? "denied" : "error");
      }
    } else {
      try {
        window.localStorage.setItem(LOCAL_DIRTY_KEY, "1");
      } catch (e) {}
    }
    return ok;
  },
};

// One-time (per device+uid) local→cloud merge, then cloud is source of truth.
// Merge rule: union by preset id; cloud wins on collision; cloud order first,
// local-only presets appended. Signed-out writes set LOCAL_DIRTY_KEY, which
// forces a re-merge so presets created while signed out survive the next
// sign-in. (Signed-out *edits* to an already-synced preset id are superseded
// by the cloud copy on re-merge.)
async function loadPresetsForUser(uid) {
  const parse = (s) => {
    try {
      const a = JSON.parse(s);
      return Array.isArray(a) ? a : [];
    } catch (e) {
      return [];
    }
  };
  let cloudRaw = null;
  try {
    const snap = await cloudDoc(uid, STORAGE_KEY).get();
    if (snap.exists) cloudRaw = snap.data().value;
  } catch (e) {
    // Cloud unreachable: surface the local mirror instead, and don't set the
    // merge flag so the merge retries on a later sign-in.
    const err = new Error("cloud-unavailable");
    err.code = e && e.code;
    err.fallback = parse(await localGet(STORAGE_KEY));
    throw err;
  }
  const cloud = cloudRaw ? parse(cloudRaw) : [];
  let merged = cloud;
  let alreadyMerged = false;
  let localDirty = false;
  try {
    alreadyMerged = window.localStorage.getItem(MERGE_FLAG_PREFIX + uid) === "1";
    localDirty = window.localStorage.getItem(LOCAL_DIRTY_KEY) === "1";
  } catch (e) {}
  if (!alreadyMerged || localDirty) {
    const local = parse(await localGet(STORAGE_KEY));
    const cloudIds = {};
    cloud.forEach((p) => {
      if (p && p.id) cloudIds[p.id] = true;
    });
    const additions = local.filter((p) => p && p.id && !cloudIds[p.id]);
    merged = cloud.concat(additions);
    if (additions.length > 0) {
      // Must succeed before the flag is set, so failed migrations retry.
      try {
        await cloudDoc(uid, STORAGE_KEY).set({
          value: JSON.stringify(merged),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        try {
          await localSet(STORAGE_KEY, JSON.stringify(merged));
        } catch (e2) {}
        const err = new Error("merge-write-failed");
        err.code = e && e.code;
        err.fallback = merged;
        throw err;
      }
    }
    try {
      window.localStorage.setItem(MERGE_FLAG_PREFIX + uid, "1");
      window.localStorage.removeItem(LOCAL_DIRTY_KEY);
    } catch (e) {}
  }
  try {
    await localSet(STORAGE_KEY, JSON.stringify(merged));
  } catch (e) {}
  return merged;
}

function AbsWorkoutTimer({ onHome, user, authReady, onSyncState }) {
  // ---- Setup flow: home (pick preset) → preview → edit ----
  const [setupView, setSetupView] = useState("home");
  const [workout, setWorkout] = useState(() => withUids(BUILTIN_PRESETS[0].exercises));
  const [restBetween, setRestBetween] = useState(BUILTIN_PRESETS[0].rest);
  const [roundRest, setRoundRest] = useState(BUILTIN_PRESETS[0].roundRest);
  const [totalRounds, setTotalRounds] = useState(BUILTIN_PRESETS[0].rounds);
  const [selectedId, setSelectedId] = useState("classic");
  const [selectedName, setSelectedName] = useState(BUILTIN_PRESETS[0].name);
  const [edited, setEdited] = useState(false);
  const [customPresets, setCustomPresets] = useState([]);
  const [presetsLoaded, setPresetsLoaded] = useState(false);
  const [presetName, setPresetName] = useState("");
  const [showLibrary, setShowLibrary] = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [infoUid, setInfoUid] = useState(null); // preview: expanded description row
  const [libInfoId, setLibInfoId] = useState(null); // edit: library exercise info

  const [confirmDelete, setConfirmDelete] = useState(null); // { id, name } awaiting confirmation

  // ---- Drag state (commit on drop) ----
  const [dragIndex, setDragIndex] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const dragRef = useRef({ index: null, startY: 0, offset: 0, moved: false });

  // ---- Timer state ----
  const [phase, setPhase] = useState("idle");
  const [round, setRound] = useState(1);
  const [exIndex, setExIndex] = useState(0);
  const [timeLeft, setTimeLeft] = useState(GET_READY);
  const [running, setRunning] = useState(false);
  const [soundOn, setSoundOn] = useState(true);

  const audioCtxRef = useRef(null);
  const wakeLockRef = useRef(null);

  const exercises = workout
    .map((w) => {
      const ex = byId(w.exId);
      if (!ex) return null;
      return {
        ...ex,
        uid: w.uid,
        duration: w.duration != null ? w.duration : ex.duration,
      };
    })
    .filter(Boolean);

  const isCustomSelected = customPresets.some((p) => p.id === selectedId);

  // ---- Load saved presets (re-runs when the signed-in user changes) ----
  // Auth itself lives in App; this page only consumes user/authReady and
  // reports sync progress up via onSyncState.
  useEffect(() => {
    if (!authReady) return;
    let cancelled = false;
    setPresetsLoaded(false); // re-runs on sign-in/out: show skeletons while refetching
    (async () => {
      try {
        if (user) onSyncState("syncing");
        let presets;
        if (user) {
          presets = await loadPresetsForUser(user.uid); // includes one-time merge
        } else {
          const value = await store.get(STORAGE_KEY);
          presets = value ? JSON.parse(value) : [];
        }
        if (!cancelled) {
          setCustomPresets(presets);
          setPresetsLoaded(true);
          setConfirmDelete(null); // pending confirmation may target a preset gone after reload
          if (user) onSyncState("synced");
        }
      } catch (e) {
        if (!cancelled) {
          if (e && e.fallback) {
            setCustomPresets(e.fallback);
            setConfirmDelete(null);
          }
          setPresetsLoaded(true);
          if (user) onSyncState(e && e.code === "permission-denied" ? "denied" : "error");
        }
      }
    })();
    return () => {
      cancelled = true;
    };
  }, [authReady, user ? user.uid : null]);

  const persistPresets = async (presets) => {
    await store.set(STORAGE_KEY, JSON.stringify(presets));
  };

  // ---- Preset / builder actions ----
  const choosePreset = (p) => {
    setWorkout(withUids(p.exercises));
    setRestBetween(p.rest);
    setRoundRest(p.roundRest);
    setTotalRounds(p.rounds);
    setSelectedId(p.id);
    setSelectedName(p.name);
    setEdited(false);
    setSetupView("preview");
  };

  const removeExercise = (uid) => {
    setWorkout((w) => w.filter((item) => item.uid !== uid));
    setEdited(true);
  };

  const addExercise = (id) => {
    setWorkout((w) => [...w, { uid: `u${uidCounter++}`, exId: id }]);
    setEdited(true);
  };

  const changeDuration = (uid, delta) => {
    setWorkout((w) =>
      w.map((item) => {
        if (item.uid !== uid) return item;
        const base = item.duration != null ? item.duration : byId(item.exId).duration;
        return { ...item, duration: Math.max(10, Math.min(180, base + delta)) };
      })
    );
    setEdited(true);
  };

  const currentConfig = () => ({
    exercises: workout.map((w) => {
      const base = byId(w.exId);
      return w.duration == null || (base && w.duration === base.duration)
        ? w.exId
        : { id: w.exId, duration: w.duration };
    }),
    rest: restBetween,
    roundRest,
    rounds: totalRounds,
  });

  const updateExistingPreset = async () => {
    const next = customPresets.map((p) =>
      p.id === selectedId ? { ...p, ...currentConfig() } : p
    );
    setCustomPresets(next);
    await persistPresets(next);
    setEdited(false);
    setSaveMsg(`Updated "${selectedName}"`);
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const saveAsNewPreset = async () => {
    const name = presetName.trim();
    if (!name || workout.length === 0) return;
    const preset = {
      id: `custom-${Date.now()}`,
      name,
      ...currentConfig(),
      custom: true,
    };
    const next = [...customPresets, preset];
    setCustomPresets(next);
    await persistPresets(next);
    setSelectedId(preset.id);
    setSelectedName(name);
    setEdited(false);
    setPresetName("");
    setSaveMsg(`Saved "${name}"`);
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const deletePreset = async (id) => {
    const next = customPresets.filter((p) => p.id !== id);
    setCustomPresets(next);
    await persistPresets(next);
  };

  // ---- Drag to reorder: visual shift while dragging, commit once on drop ----
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const dragTarget =
    dragIndex === null
      ? null
      : clamp(dragIndex + Math.round(dragOffset / ROW_H), 0, workout.length - 1);

  const onDragMove = useCallback((e) => {
    const d = dragRef.current;
    if (d.index === null) return;
    e.preventDefault();
    d.offset = e.clientY - d.startY;
    if (Math.abs(d.offset) > 4) d.moved = true;
    setDragOffset(d.offset);
  }, []);

  const onDragEnd = useCallback(() => {
    const d = dragRef.current;
    if (d.index !== null) {
      setWorkout((w) => {
        const from = d.index;
        const to = clamp(from + Math.round(d.offset / ROW_H), 0, w.length - 1);
        if (from === to) return w;
        const next = [...w];
        const [item] = next.splice(from, 1);
        next.splice(to, 0, item);
        return next;
      });
      if (d.moved) setEdited(true);
    }
    dragRef.current = { index: null, startY: 0, offset: 0, moved: false };
    setDragIndex(null);
    setDragOffset(0);
    window.removeEventListener("pointermove", onDragMove);
    window.removeEventListener("pointerup", onDragEnd);
    window.removeEventListener("pointercancel", onDragEnd);
  }, [onDragMove]);

  const onDragStart = (e, i) => {
    e.preventDefault();
    dragRef.current = { index: i, startY: e.clientY, offset: 0, moved: false };
    setDragIndex(i);
    setDragOffset(0);
    window.addEventListener("pointermove", onDragMove, { passive: false });
    window.addEventListener("pointerup", onDragEnd);
    window.addEventListener("pointercancel", onDragEnd);
  };

  useEffect(() => {
    return () => {
      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragEnd);
    };
  }, [onDragMove, onDragEnd]);

  // Compute the visual shift of a non-dragged row while a drag is active
  const rowShift = (i) => {
    if (dragIndex === null || dragTarget === null || i === dragIndex) return 0;
    if (dragIndex < dragTarget && i > dragIndex && i <= dragTarget) return -ROW_H;
    if (dragIndex > dragTarget && i >= dragTarget && i < dragIndex) return ROW_H;
    return 0;
  };

  // ---- Audio beeps ----
  const beep = useCallback(
    (freq = 880, ms = 120) => {
      if (!soundOn) return;
      try {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioCtxRef.current;
        if (ctx.state === "suspended") ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + ms / 1000);
      } catch (e) {
        /* audio unavailable */
      }
    },
    [soundOn]
  );

  // ---- Keep screen awake while running (best-effort) ----
  useEffect(() => {
    const requestWakeLock = async () => {
      try {
        if (running && "wakeLock" in navigator) {
          wakeLockRef.current = await navigator.wakeLock.request("screen");
        }
      } catch (e) {
        /* not supported / denied */
      }
    };
    if (running) requestWakeLock();
    return () => {
      if (wakeLockRef.current) {
        wakeLockRef.current.release().catch(() => {});
        wakeLockRef.current = null;
      }
    };
  }, [running]);

  // ---- Phase transition logic ----
  const advance = useCallback(() => {
    if (phase === "ready") {
      setPhase("work");
      setTimeLeft(exercises[0].duration);
      beep(1200, 300);
      return;
    }
    if (phase === "work") {
      const isLastExercise = exIndex === exercises.length - 1;
      const isLastRound = round === totalRounds;
      if (isLastExercise && isLastRound) {
        setPhase("done");
        setRunning(false);
        beep(1400, 500);
        return;
      }
      if (isLastExercise) {
        setPhase("roundRest");
        setTimeLeft(roundRest);
        beep(600, 250);
        return;
      }
      setPhase("rest");
      setTimeLeft(restBetween);
      beep(600, 250);
      return;
    }
    if (phase === "rest") {
      const next = exIndex + 1;
      setExIndex(next);
      setPhase("work");
      setTimeLeft(exercises[next].duration);
      beep(1200, 300);
      return;
    }
    if (phase === "roundRest") {
      setRound((r) => r + 1);
      setExIndex(0);
      setPhase("work");
      setTimeLeft(exercises[0].duration);
      beep(1200, 300);
    }
  }, [phase, exIndex, round, totalRounds, restBetween, roundRest, exercises, beep]);

  // ---- Tick ----
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) return 0;
        if (t <= 4) beep(880, 100);
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, beep]);

  useEffect(() => {
    if (running && timeLeft === 0 && phase !== "done" && phase !== "idle") {
      advance();
    }
  }, [timeLeft, running, phase, advance]);

  // ---- Controls ----
  const start = () => {
    if (exercises.length === 0) return;
    setPhase("ready");
    setRound(1);
    setExIndex(0);
    setTimeLeft(GET_READY);
    setRunning(true);
    beep(880, 150);
  };
  const togglePause = () => setRunning((r) => !r);
  const skip = () => setTimeLeft(0);
  const reset = () => {
    setRunning(false);
    setPhase("idle");
    setRound(1);
    setExIndex(0);
    setTimeLeft(GET_READY);
  };
  const goBack = () => {
    if (phase === "ready") {
      setTimeLeft(GET_READY);
      return;
    }
    if (phase === "rest") {
      setPhase("work");
      setTimeLeft(exercises[exIndex].duration);
      return;
    }
    if (phase === "roundRest") {
      const last = exercises.length - 1;
      setExIndex(last);
      setPhase("work");
      setTimeLeft(exercises[last].duration);
      return;
    }
    if (phase === "work") {
      if (exIndex > 0) {
        const prev = exIndex - 1;
        setExIndex(prev);
        setTimeLeft(exercises[prev].duration);
      } else if (round > 1) {
        const last = exercises.length - 1;
        setRound((r) => r - 1);
        setExIndex(last);
        setTimeLeft(exercises[last].duration);
      } else {
        setTimeLeft(exercises[0].duration);
      }
    }
  };

  // ---- Derived display values ----
  const theme = THEME[phase] || THEME.ready;
  const currentEx = exercises[exIndex];
  const nextEx =
    phase === "ready"
      ? exercises[0]
      : phase === "rest"
      ? exercises[exIndex + 1]
      : phase === "roundRest"
      ? exercises[0]
      : phase === "work" && exIndex < exercises.length - 1
      ? exercises[exIndex + 1]
      : null;

  const phaseTotal =
    phase === "ready"
      ? GET_READY
      : phase === "work"
      ? currentEx.duration
      : phase === "rest"
      ? restBetween
      : phase === "roundRest"
      ? roundRest
      : 1;
  const progress = 1 - timeLeft / phaseTotal;

  const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  const totalWorkoutSecs =
    GET_READY +
    totalRounds * exercises.reduce((a, e) => a + e.duration, 0) +
    totalRounds * Math.max(0, exercises.length - 1) * restBetween +
    (totalRounds - 1) * roundRest;
  const totalMins = Math.max(1, Math.round(totalWorkoutSecs / 60));

  const allPresets = [...BUILTIN_PRESETS, ...customPresets];

  // ================= HOME: PICK A PRESET =================
  if (phase === "idle" && setupView === "home") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <div style={styles.pageHeader}>
            <HomeButton onClick={onHome} />
          </div>

          <div style={styles.eyebrow}>ABS CIRCUIT</div>
          <h1 style={styles.setupTitle}>Pick your workout.</h1>

          <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 24 }}>
            {(presetsLoaded ? allPresets : BUILTIN_PRESETS).map((p) => {
              const exs = p.exercises.map(resolveEntry).filter(Boolean);
              const mins = Math.max(
                1,
                Math.round(
                  (GET_READY +
                    p.rounds * exs.reduce((a, e) => a + e.duration, 0) +
                    p.rounds * Math.max(0, exs.length - 1) * p.rest +
                    (p.rounds - 1) * p.roundRest) /
                    60
                )
              );
              return (
                <div key={p.id} style={styles.presetCard} onClick={() => choosePreset(p)}>
                  <div style={{ flex: 1 }}>
                    <div style={styles.presetCardName}>
                      {p.name}
                      {p.custom && <span style={styles.customBadge}>YOURS</span>}
                    </div>
                    <div style={styles.presetCardMeta}>
                      {exs.length} exercises · {p.rounds} rounds · ~{mins} min
                    </div>
                  </div>
                  {p.custom && (
                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        setConfirmDelete({ id: p.id, name: p.name });
                      }}
                      style={styles.cardDelete}
                      aria-label={`Delete preset ${p.name}`}
                    >
                      ×
                    </button>
                  )}
                  <span style={styles.presetArrow}>›</span>
                </div>
              );
            })}
            {!presetsLoaded && (
              <React.Fragment>
                <SkeletonCard />
                <SkeletonCard delay={0.2} />
              </React.Fragment>
            )}
          </div>

        </div>

        {confirmDelete && (
          <div style={styles.confirmOverlay} onClick={() => setConfirmDelete(null)}>
            <div style={styles.confirmBox} onClick={(e) => e.stopPropagation()}>
              <div style={styles.confirmTitle}>Delete preset?</div>
              <div style={styles.confirmText}>
                "{confirmDelete.name}" will be removed. This can't be undone.
              </div>
              <div style={styles.confirmActions}>
                <button style={styles.confirmCancel} onClick={() => setConfirmDelete(null)}>
                  Cancel
                </button>
                <button
                  style={styles.confirmDeleteBtn}
                  onClick={() => {
                    deletePreset(confirmDelete.id);
                    setConfirmDelete(null);
                  }}
                >
                  Delete
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ================= PREVIEW: PRESET DETAILS + START =================
  if (phase === "idle" && setupView === "preview") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <div style={styles.pageHeader}>
            <button onClick={() => setSetupView("home")} style={styles.backLink}>
              ‹ All workouts
            </button>
          </div>
          <h1 style={styles.setupTitle}>
            {selectedName}
            {edited && <span style={styles.editedTag}> · edited</span>}
          </h1>
          <div style={styles.previewMeta}>
            {exercises.length} exercises · {totalRounds} rounds · ~{totalMins} min
          </div>
          <div style={styles.previewHint}>Tap an exercise to see how it's done</div>

          <div style={{ ...styles.exList, marginTop: 24 }}>
            {exercises.map((ex, i) => (
              <React.Fragment key={ex.uid}>
                <div
                  style={{ ...styles.previewRow, cursor: "pointer" }}
                  onClick={() => setInfoUid(infoUid === ex.uid ? null : ex.uid)}
                >
                  <span style={styles.previewIndex}>{i + 1}</span>
                  <span style={styles.exName}>
                    {ex.name}
                    <span style={styles.infoIcon}>{infoUid === ex.uid ? "▾" : "ⓘ"}</span>
                  </span>
                  <span style={styles.exDur}>{ex.duration}s</span>
                </div>
                {infoUid === ex.uid && <div style={styles.descBox}>{ex.desc}</div>}
              </React.Fragment>
            ))}
          </div>

          <div style={styles.previewTiming}>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{restBetween}s</span>
              <span style={styles.timingLabel}>rest between exercises</span>
            </div>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{roundRest}s</span>
              <span style={styles.timingLabel}>rest between rounds</span>
            </div>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{totalRounds}</span>
              <span style={styles.timingLabel}>rounds</span>
            </div>
          </div>

          <button onClick={start} style={styles.startBtn}>
            START WORKOUT
          </button>
          <button
            onClick={() => {
              setLibInfoId(null);
              setSetupView("edit");
            }}
            style={styles.editBtn}
          >
            Edit workout
          </button>
        </div>
      </div>
    );
  }

  // ================= EDIT MODE: BUILDER WITH DRAG REORDER =================
  if (phase === "idle" && setupView === "edit") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <div style={styles.pageHeader}>
            <button onClick={() => setSetupView("preview")} style={styles.backLink}>
              ‹ Done editing
            </button>
          </div>
          <h1 style={styles.setupTitle}>Edit workout</h1>
          <div style={styles.previewMeta}>
            Hold ⠿ and drag to reorder · − / + to adjust time · tap × to remove
          </div>

          <div style={styles.sectionLabel}>EXERCISES</div>
          <div style={styles.exList}>
            {exercises.length === 0 && (
              <div style={{ padding: "16px 0", color: "#8FA3BF", fontSize: 15 }}>
                No exercises yet — add some below.
              </div>
            )}
            {exercises.map((ex, i) => {
              const isDragging = dragIndex === i;
              const shift = rowShift(i);
              return (
                <div
                  key={ex.uid}
                  style={{
                    ...styles.exRow,
                    height: ROW_H,
                    boxSizing: "border-box",
                    transform: isDragging
                      ? `translateY(${dragOffset}px) scale(1.02)`
                      : `translateY(${shift}px)`,
                    transition: isDragging ? "none" : "transform 0.18s ease",
                    background: isDragging ? "#1E2C48" : "transparent",
                    boxShadow: isDragging ? "0 8px 24px rgba(0,0,0,0.55)" : "none",
                    borderRadius: isDragging ? 12 : 0,
                    borderBottom: isDragging ? "1px solid transparent" : "1px solid #26324A",
                    position: "relative",
                    zIndex: isDragging ? 10 : 1,
                  }}
                >
                  <div
                    onPointerDown={(e) => onDragStart(e, i)}
                    style={styles.dragHandle}
                    aria-label={`Drag to reorder ${ex.name}`}
                  >
                    ⠿
                  </div>
                  <span style={styles.exName}>{ex.name}</span>
                  <button
                    onClick={() => changeDuration(ex.uid, -5)}
                    style={styles.durBtn}
                    aria-label={`Decrease ${ex.name} time`}
                  >
                    −
                  </button>
                  <span style={{ ...styles.exDur, minWidth: 36, textAlign: "center" }}>
                    {ex.duration}s
                  </span>
                  <button
                    onClick={() => changeDuration(ex.uid, 5)}
                    style={styles.durBtn}
                    aria-label={`Increase ${ex.name} time`}
                  >
                    +
                  </button>
                  <button
                    onClick={() => removeExercise(ex.uid)}
                    style={styles.removeBtn}
                    aria-label={`Remove ${ex.name}`}
                  >
                    ×
                  </button>
                </div>
              );
            })}
          </div>

          <button
            onClick={() => {
              setShowLibrary((s) => !s);
              setLibInfoId(null);
            }}
            style={styles.addToggle}
          >
            {showLibrary ? "− Hide exercise library" : "+ Add exercises"}
          </button>
          {showLibrary && (
            <div style={styles.libraryGrid}>
              {LIBRARY.map((ex) => (
                <React.Fragment key={ex.id}>
                  <div style={styles.libChip}>
                    <button
                      onClick={() => addExercise(ex.id)}
                      style={styles.libAdd}
                      aria-label={`Add ${ex.name}`}
                    >
                      + {ex.name} <span style={{ color: "#5B8DEF" }}>{ex.duration}s</span>
                    </button>
                    <button
                      onClick={() => setLibInfoId(libInfoId === ex.id ? null : ex.id)}
                      style={{
                        ...styles.libInfo,
                        color: libInfoId === ex.id ? "#5B8DEF" : "#8FA3BF",
                      }}
                      aria-label={`About ${ex.name}`}
                      aria-expanded={libInfoId === ex.id}
                      aria-controls={`lib-desc-${ex.id}`}
                    >
                      {libInfoId === ex.id ? "▾" : "ⓘ"}
                    </button>
                  </div>
                  {libInfoId === ex.id && (
                    <div id={`lib-desc-${ex.id}`} style={styles.libDescBox}>
                      <strong>{ex.name}</strong> — {ex.desc}
                    </div>
                  )}
                </React.Fragment>
              ))}
            </div>
          )}

          <div style={styles.sectionLabel}>TIMING</div>
          <Stepper
            label="Rest between exercises"
            value={restBetween}
            unit="s"
            onChange={(v) => {
              setRestBetween(v);
              setEdited(true);
            }}
            min={5}
            max={60}
            step={5}
          />
          <Stepper
            label="Rest between rounds"
            value={roundRest}
            unit="s"
            onChange={(v) => {
              setRoundRest(v);
              setEdited(true);
            }}
            min={30}
            max={180}
            step={15}
          />
          <Stepper
            label="Rounds"
            value={totalRounds}
            unit=""
            onChange={(v) => {
              setTotalRounds(v);
              setEdited(true);
            }}
            min={1}
            max={5}
            step={1}
          />

          <div style={styles.sectionLabel}>SAVE</div>
          {isCustomSelected && (
            <button
              onClick={updateExistingPreset}
              disabled={!edited || exercises.length === 0}
              style={{
                ...styles.updateBtn,
                opacity: !edited || exercises.length === 0 ? 0.4 : 1,
              }}
            >
              Update "{selectedName}"
            </button>
          )}
          <div style={{ ...styles.saveRow, marginTop: isCustomSelected ? 10 : 0 }}>
            <input
              value={presetName}
              onChange={(e) => setPresetName(e.target.value)}
              placeholder="Save as new preset…"
              style={styles.saveInput}
            />
            <button
              onClick={saveAsNewPreset}
              disabled={!presetName.trim() || exercises.length === 0}
              style={{
                ...styles.saveBtn,
                opacity: !presetName.trim() || exercises.length === 0 ? 0.4 : 1,
              }}
            >
              Save
            </button>
          </div>
          {saveMsg && <div style={styles.saveMsg}>{saveMsg}</div>}

          <button
            onClick={() => setSetupView("preview")}
            disabled={exercises.length === 0}
            style={{ ...styles.startBtn, opacity: exercises.length === 0 ? 0.4 : 1 }}
          >
            DONE · ~{totalMins} MIN
          </button>
        </div>
      </div>
    );
  }

  // ================= DONE SCREEN =================
  if (phase === "done") {
    return (
      <div style={{ ...styles.screen, background: THEME.done.bg }}>
        <div style={styles.doneWrap}>
          <div style={{ fontSize: 72 }}>💪</div>
          <h1 style={styles.doneTitle}>Workout complete</h1>
          <p style={styles.doneSub}>
            {selectedName} · {totalRounds} rounds · {totalRounds * exercises.length} sets · ~
            {totalMins} min
          </p>
          <button
            onClick={() => {
              reset();
              setSetupView("preview");
            }}
            style={{ ...styles.startBtn, marginTop: 32 }}
          >
            GO AGAIN
          </button>
          <button
            onClick={() => {
              reset();
              setSetupView("home");
            }}
            style={styles.editBtn}
          >
            All workouts
          </button>
        </div>
      </div>
    );
  }

  // ================= ACTIVE TIMER SCREEN =================
  return (
    <div style={{ ...styles.screen, background: theme.bg, transition: "background 0.4s ease" }}>
      <div style={styles.topBar}>
        <span style={{ ...styles.phaseTag, color: theme.accent }}>{theme.label}</span>
        <span style={{ ...styles.roundTag, color: theme.accent }}>
          ROUND {round}/{totalRounds}
        </span>
        <button
          onClick={() => setSoundOn((s) => !s)}
          style={{ ...styles.iconBtn, color: theme.accent }}
          aria-label={soundOn ? "Mute sounds" : "Unmute sounds"}
        >
          {soundOn ? "🔊" : "🔇"}
        </button>
      </div>

      <div style={styles.centerBlock}>
        <div style={styles.exerciseName}>
          {phase === "work" ? currentEx.name : phase === "ready" ? "Get in position" : "Breathe"}
        </div>
        {phase === "work" && (
          <div style={{ ...styles.cue, color: theme.accent }}>{currentEx.cue}</div>
        )}

        <div style={styles.bigTime}>{fmt(timeLeft)}</div>

        <div style={styles.progressTrack}>
          <div
            style={{
              ...styles.progressFill,
              width: `${progress * 100}%`,
              background: theme.accent,
            }}
          />
        </div>

        <div style={styles.dots}>
          {exercises.map((ex, i) => (
            <div
              key={ex.uid}
              style={{
                ...styles.dot,
                background:
                  i < exIndex || (i === exIndex && phase !== "ready")
                    ? theme.accent
                    : "rgba(255,255,255,0.25)",
              }}
            />
          ))}
        </div>

        {nextEx && (
          <div style={{ ...styles.upNext, color: theme.accent }}>
            UP NEXT — {nextEx.name} · {nextEx.duration}s
          </div>
        )}
      </div>

      <div style={styles.controls}>
        <button onClick={running ? goBack : reset} style={styles.ctrlBtnSecondary}>
          {running ? "Back" : "Reset"}
        </button>
        <button onClick={togglePause} style={styles.ctrlBtnPrimary}>
          {running ? "Pause" : "Resume"}
        </button>
        <button onClick={skip} style={styles.ctrlBtnSecondary}>
          Skip
        </button>
      </div>
    </div>
  );
}

// ---- Gym tracker page ----
// Log gym sessions: fuzzy-search the catalog (EN/HE), record weight × reps
// per set, and keep a timestamped session history. The in-progress session is
// persisted under GYM_ACTIVE_KEY so a reload doesn't lose it; set inputs are
// kept as raw strings while typing and parsed to numbers on finish.
const parseNum = (s) => {
  const n = parseFloat(String(s).replace(",", "."));
  return isFinite(n) && n >= 0 ? n : null;
};

const fmtSessionDate = (iso) => {
  try {
    const d = new Date(iso);
    const opts = { weekday: "short", month: "short", day: "numeric" };
    if (d.getFullYear() !== new Date().getFullYear()) opts.year = "numeric";
    return (
      d.toLocaleDateString(undefined, opts) +
      " · " +
      d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" })
    );
  } catch (e) {
    return iso;
  }
};

const fmtSet = (st) =>
  st.weight != null && st.reps != null
    ? `${st.weight}kg × ${st.reps}`
    : st.weight != null
    ? `${st.weight}kg`
    : `× ${st.reps}`;

function GymTracker({ onHome }) {
  const [loaded, setLoaded] = useState(false);
  const [sessions, setSessions] = useState([]);
  const [weights, setWeights] = useState({}); // exId → { weight, reps, at }
  const [active, setActive] = useState(null); // in-progress session
  const [view, setView] = useState("home"); // home | session
  const [query, setQuery] = useState("");
  const [groupFilter, setGroupFilter] = useState(null); // browse-by-group when not searching
  const [openSessionId, setOpenSessionId] = useState(null); // expanded history card
  const [confirmAction, setConfirmAction] = useState(null); // { type: "deleteSession"|"discard", ... }
  const saveTimer = useRef(null);

  // Load everything through the store (cloud when signed in, else local).
  useEffect(() => {
    let cancelled = false;
    const parse = (raw, fallback) => {
      try {
        const v = JSON.parse(raw);
        return v == null ? fallback : v;
      } catch (e) {
        return fallback;
      }
    };
    (async () => {
      const [s, w, a] = await Promise.all([
        store.get(GYM_SESSIONS_KEY),
        store.get(GYM_WEIGHTS_KEY),
        store.get(GYM_ACTIVE_KEY),
      ]);
      if (cancelled) return;
      const sess = parse(s, []);
      setSessions(Array.isArray(sess) ? sess : []);
      const wm = parse(w, {});
      setWeights(wm && typeof wm === "object" && !Array.isArray(wm) ? wm : {});
      const act = parse(a, null);
      if (act && Array.isArray(act.entries)) setActive(act);
      setLoaded(true);
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  // Debounce active-session writes: every keystroke updates state, but the
  // store (and Firestore, when signed in) only sees one write per pause.
  // pendingRef holds a value scheduled but not yet written (undefined = none),
  // so it can be flushed if the page hides or the component unmounts mid-wait.
  const pendingRef = useRef(undefined);
  const persistActive = (a) => {
    setActive(a);
    pendingRef.current = a;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      pendingRef.current = undefined;
      store.set(GYM_ACTIVE_KEY, JSON.stringify(a));
    }, 600);
  };
  const persistActiveNow = (a) => {
    setActive(a);
    pendingRef.current = undefined;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    store.set(GYM_ACTIVE_KEY, JSON.stringify(a));
  };

  useEffect(() => {
    const flush = () => {
      if (pendingRef.current === undefined) return;
      const a = pendingRef.current;
      pendingRef.current = undefined;
      if (saveTimer.current) clearTimeout(saveTimer.current);
      store.set(GYM_ACTIVE_KEY, JSON.stringify(a));
    };
    window.addEventListener("pagehide", flush);
    return () => {
      window.removeEventListener("pagehide", flush);
      flush();
    };
  }, []);

  const startSession = () => {
    persistActiveNow({ id: `s-${Date.now()}`, startedAt: new Date().toISOString(), entries: [] });
    setQuery("");
    setGroupFilter(null);
    setView("session");
  };

  const addExercise = (exId) => {
    const last = weights[exId];
    const entry = {
      uid: `g${uidCounter++}`,
      exId,
      sets: [
        {
          uid: `g${uidCounter++}`,
          weight: last && last.weight != null ? String(last.weight) : "",
          reps: last && last.reps != null ? String(last.reps) : "",
        },
      ],
    };
    persistActive({ ...active, entries: [...active.entries, entry] });
    setQuery("");
  };

  const removeEntry = (uid) =>
    persistActive({ ...active, entries: active.entries.filter((en) => en.uid !== uid) });

  const addSet = (entryUid) =>
    persistActive({
      ...active,
      entries: active.entries.map((en) => {
        if (en.uid !== entryUid) return en;
        const prev = en.sets[en.sets.length - 1];
        return {
          ...en,
          sets: [
            ...en.sets,
            { uid: `g${uidCounter++}`, weight: prev ? prev.weight : "", reps: prev ? prev.reps : "" },
          ],
        };
      }),
    });

  const removeSet = (entryUid, setUid) =>
    persistActive({
      ...active,
      entries: active.entries.map((en) =>
        en.uid === entryUid ? { ...en, sets: en.sets.filter((st) => st.uid !== setUid) } : en
      ),
    });

  const updateSet = (entryUid, setUid, field, value) =>
    persistActive({
      ...active,
      entries: active.entries.map((en) =>
        en.uid === entryUid
          ? {
              ...en,
              sets: en.sets.map((st) =>
                st.uid === setUid ? { ...st, [field]: value.replace(/[^0-9.,]/g, "") } : st
              ),
            }
          : en
      ),
    });

  const hasLoggedSet =
    active &&
    active.entries.some((en) =>
      en.sets.some((st) => parseNum(st.weight) != null || parseNum(st.reps) != null)
    );

  const finishSession = () => {
    const entries = active.entries
      .map((en) => ({
        exId: en.exId,
        sets: en.sets
          .map((st) => ({ weight: parseNum(st.weight), reps: parseNum(st.reps) }))
          .filter((st) => st.weight != null || st.reps != null),
      }))
      .filter((en) => en.sets.length > 0);
    if (entries.length === 0) return;
    const session = {
      id: active.id,
      startedAt: active.startedAt,
      endedAt: new Date().toISOString(),
      entries,
    };
    const nextSessions = [session, ...sessions];
    // Record the last weight used per exercise (last set that has a weight).
    const nextWeights = { ...weights };
    entries.forEach((en) => {
      const withWeight = en.sets.filter((st) => st.weight != null);
      const last = withWeight[withWeight.length - 1];
      if (last) nextWeights[en.exId] = { weight: last.weight, reps: last.reps, at: session.endedAt };
    });
    setSessions(nextSessions);
    setWeights(nextWeights);
    store.set(GYM_SESSIONS_KEY, JSON.stringify(nextSessions));
    store.set(GYM_WEIGHTS_KEY, JSON.stringify(nextWeights));
    persistActiveNow(null);
    setOpenSessionId(session.id);
    setView("home");
  };

  const discardSession = () => {
    persistActiveNow(null);
    setView("home");
  };

  const deleteSession = (id) => {
    const next = sessions.filter((s) => s.id !== id);
    setSessions(next);
    store.set(GYM_SESSIONS_KEY, JSON.stringify(next));
  };

  const results = query.trim()
    ? GYM_EXERCISES.map((ex) => ({ ex, score: fuzzyScore(query, ex.search) }))
        .filter((r) => r.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 25)
        .map((r) => r.ex)
    : groupFilter
    ? GYM_EXERCISES.filter((ex) => ex.group === groupFilter)
    : [];

  const lastHint = (exId) => {
    const w = weights[exId];
    if (!w || w.weight == null) return null;
    return w.reps != null ? `${w.weight}kg × ${w.reps}` : `${w.weight}kg`;
  };

  const confirmOverlay = confirmAction && (
    <div style={styles.confirmOverlay} onClick={() => setConfirmAction(null)}>
      <div style={styles.confirmBox} onClick={(e) => e.stopPropagation()}>
        <div style={styles.confirmTitle}>
          {confirmAction.type === "discard" ? "Discard session?" : "Delete session?"}
        </div>
        <div style={styles.confirmText}>
          {confirmAction.type === "discard"
            ? "This gym session won't be saved."
            : `The session from ${confirmAction.label} will be removed. This can't be undone.`}
        </div>
        <div style={styles.confirmActions}>
          <button style={styles.confirmCancel} onClick={() => setConfirmAction(null)}>
            Cancel
          </button>
          <button
            style={styles.confirmDeleteBtn}
            onClick={() => {
              if (confirmAction.type === "discard") discardSession();
              else deleteSession(confirmAction.id);
              setConfirmAction(null);
            }}
          >
            {confirmAction.type === "discard" ? "Discard" : "Delete"}
          </button>
        </div>
      </div>
    </div>
  );

  // ================= ACTIVE GYM SESSION =================
  if (view === "session" && active) {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <div style={styles.pageHeader}>
            <button onClick={() => setView("home")} style={styles.backLink}>
              ‹ Gym log
            </button>
          </div>
          <h1 style={styles.setupTitle}>Session in progress</h1>
          <div style={styles.previewMeta}>Started {fmtSessionDate(active.startedAt)}</div>

          {active.entries.length > 0 && <div style={styles.sectionLabel}>EXERCISES</div>}
          {active.entries.map((en) => {
            const ex = gymById(en.exId);
            if (!ex) return null;
            const hint = lastHint(en.exId);
            return (
              <div key={en.uid} style={styles.gymEntryCard}>
                <div style={styles.gymEntryHead}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={styles.gymEntryName}>{ex.name}</div>
                    <div style={styles.gymEntryHe} dir="auto">
                      {ex.he}
                      {hint && <span style={styles.gymLastHint}> · last: {hint}</span>}
                    </div>
                  </div>
                  <button
                    onClick={() => removeEntry(en.uid)}
                    style={styles.removeBtn}
                    aria-label={`Remove ${ex.name}`}
                  >
                    ×
                  </button>
                </div>
                {en.sets.map((st, i) => (
                  <div key={st.uid} style={styles.gymSetRow}>
                    <span style={styles.gymSetIndex}>{i + 1}</span>
                    <input
                      value={st.weight}
                      onChange={(e) => updateSet(en.uid, st.uid, "weight", e.target.value)}
                      placeholder="kg"
                      inputMode="decimal"
                      style={styles.gymSetInput}
                      aria-label={`${ex.name} set ${i + 1} weight`}
                    />
                    <span style={styles.gymSetSep}>kg ×</span>
                    <input
                      value={st.reps}
                      onChange={(e) => updateSet(en.uid, st.uid, "reps", e.target.value)}
                      placeholder="reps"
                      inputMode="numeric"
                      style={styles.gymSetInput}
                      aria-label={`${ex.name} set ${i + 1} reps`}
                    />
                    <span style={styles.gymSetSep}>reps</span>
                    <button
                      onClick={() => removeSet(en.uid, st.uid)}
                      style={{ ...styles.removeBtn, fontSize: 18 }}
                      aria-label={`Remove set ${i + 1}`}
                    >
                      ×
                    </button>
                  </div>
                ))}
                <button onClick={() => addSet(en.uid)} style={styles.gymAddSetBtn}>
                  + Add set
                </button>
              </div>
            );
          })}

          <div style={styles.sectionLabel}>ADD EXERCISE</div>
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Search… / חיפוש תרגיל…"
            dir="auto"
            style={styles.gymSearchInput}
          />
          {!query.trim() && (
            <div style={styles.gymGroupChips}>
              {GYM_GROUPS.map((g) => (
                <button
                  key={g}
                  onClick={() => setGroupFilter(groupFilter === g ? null : g)}
                  style={{
                    ...styles.gymGroupChip,
                    borderColor: groupFilter === g ? "#5B8DEF" : "#3B4A63",
                    color: groupFilter === g ? "#5B8DEF" : "#8FA3BF",
                  }}
                >
                  {g} · {GYM_GROUP_HE[g]}
                </button>
              ))}
            </div>
          )}
          {query.trim() && results.length === 0 && (
            <div style={styles.gymEmptyText}>No exercises match "{query.trim()}".</div>
          )}
          {results.length > 0 && (
            <div style={{ ...styles.exList, marginTop: 10 }}>
              {results.map((ex) => {
                const hint = lastHint(ex.id);
                return (
                  <div key={ex.id} style={styles.gymResultRow} onClick={() => addExercise(ex.id)}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={styles.gymResultName}>{ex.name}</div>
                      <div style={styles.gymEntryHe} dir="auto">
                        {ex.he} · {ex.group}
                      </div>
                    </div>
                    {hint && <span style={styles.gymLastBadge}>{hint}</span>}
                    <span style={{ ...styles.presetArrow, fontSize: 22 }}>+</span>
                  </div>
                );
              })}
            </div>
          )}

          <button
            onClick={finishSession}
            disabled={!hasLoggedSet}
            style={{ ...styles.startBtn, opacity: hasLoggedSet ? 1 : 0.4 }}
          >
            FINISH SESSION
          </button>
          <button onClick={() => setConfirmAction({ type: "discard" })} style={styles.editBtn}>
            Discard session
          </button>
        </div>
        {confirmOverlay}
      </div>
    );
  }

  // ================= GYM HOME: START + HISTORY =================
  return (
    <div style={{ ...styles.screen, background: "#0F1520" }}>
      <div style={styles.setupWrap}>
        <div style={styles.pageHeader}>
          <HomeButton onClick={onHome} />
        </div>
        <div style={styles.eyebrow}>GYM LOG</div>
        <h1 style={styles.setupTitle}>Track your lifts.</h1>

        {loaded ? (
          <React.Fragment>
            <button
              onClick={active ? () => setView("session") : startSession}
              style={{ ...styles.startBtn, marginTop: 24 }}
            >
              {active ? "RESUME SESSION" : "START GYM SESSION"}
            </button>
            {active && (
              <div style={styles.gymActiveHint}>
                In progress — started {fmtSessionDate(active.startedAt)}
              </div>
            )}
          </React.Fragment>
        ) : (
          <Skeleton h={62} r={16} style={{ marginTop: 24 }} />
        )}

        <div style={styles.sectionLabel}>HISTORY</div>
        {loaded && sessions.length === 0 && (
          <div style={styles.gymEmptyText}>
            No sessions yet. Start one and it'll show up here with its date and weights.
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {!loaded && (
            <React.Fragment>
              <SkeletonCard />
              <SkeletonCard delay={0.15} />
              <SkeletonCard delay={0.3} />
            </React.Fragment>
          )}
          {sessions.map((s) => {
            const totalSets = s.entries.reduce((a, en) => a + en.sets.length, 0);
            const open = openSessionId === s.id;
            return (
              <div key={s.id} style={styles.gymHistoryCard}>
                <div
                  style={styles.gymHistoryHead}
                  onClick={() => setOpenSessionId(open ? null : s.id)}
                >
                  <div style={{ flex: 1 }}>
                    <div style={styles.gymHistoryDate}>{fmtSessionDate(s.startedAt)}</div>
                    <div style={styles.presetCardMeta}>
                      {s.entries.length} exercise{s.entries.length !== 1 ? "s" : ""} · {totalSets}{" "}
                      set{totalSets !== 1 ? "s" : ""}
                    </div>
                  </div>
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      setConfirmAction({
                        type: "deleteSession",
                        id: s.id,
                        label: fmtSessionDate(s.startedAt),
                      });
                    }}
                    style={styles.cardDelete}
                    aria-label="Delete session"
                  >
                    ×
                  </button>
                  <span style={styles.presetArrow}>{open ? "▾" : "›"}</span>
                </div>
                {open &&
                  s.entries.map((en, i) => {
                    const ex = gymById(en.exId);
                    return (
                      <div key={i} style={styles.gymHistoryEx}>
                        <div style={styles.gymHistoryExName}>
                          {ex ? ex.name : en.exId}
                          {ex && (
                            <span style={{ ...styles.gymEntryHe, marginLeft: 8 }} dir="auto">
                              {ex.he}
                            </span>
                          )}
                        </div>
                        <div style={styles.gymHistorySets}>
                          {en.sets.map((st) => fmtSet(st)).join("  ·  ")}
                        </div>
                      </div>
                    );
                  })}
              </div>
            );
          })}
        </div>
      </div>
      {confirmOverlay}
    </div>
  );
}

// ---- Root: home ⇄ timer / gym tracker ----
// Auth lives here (not in a page) so the account section can render on the
// landing page while the timer still reloads presets when the user changes.
function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(!firebaseReady); // no firebase => nothing to wait for
  const [syncState, setSyncState] = useState("idle"); // idle | syncing | synced | error | denied

  useEffect(() => {
    store.notify = (s) => setSyncState(s);
    if (!firebaseReady) {
      return () => {
        store.notify = null;
      };
    }
    let unsub = null;
    try {
      unsub = firebase.auth().onAuthStateChanged(
        (u) => {
          setUser(u);
          setAuthReady(true);
        },
        () => setAuthReady(true)
      );
    } catch (e) {
      setAuthReady(true);
    }
    return () => {
      store.notify = null;
      if (unsub) unsub();
    };
  }, []);

  const signIn = async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
      } catch (e) {
        // Popup blocked (common on mobile) → best-effort redirect fallback.
        // Note: redirect with the default *.firebaseapp.com authDomain is
        // degraded by third-party-cookie blocking in some browsers; popup is
        // the primary path. A user closing the popup is not an error.
        if (
          e &&
          (e.code === "auth/popup-blocked" ||
            e.code === "auth/operation-not-supported-in-this-environment")
        ) {
          await firebase.auth().signInWithRedirect(provider);
        } else if (!e || e.code !== "auth/popup-closed-by-user") {
          setSyncState("error");
        }
      }
    } catch (e) {
      setSyncState("error");
    }
  };

  const signOut = async () => {
    try {
      await firebase.auth().signOut();
    } catch (e) {}
    setSyncState("idle"); // the local mirror already holds the latest data
  };

  if (page === "timer")
    return (
      <AbsWorkoutTimer
        onHome={() => setPage("home")}
        user={user}
        authReady={authReady}
        onSyncState={setSyncState}
      />
    );
  if (page === "gym") return <GymTracker onHome={() => setPage("home")} />;
  return (
    <HomePage
      onOpenTimer={() => setPage("timer")}
      onOpenGym={() => setPage("gym")}
      user={user}
      syncState={syncState}
      onSignIn={signIn}
      onSignOut={signOut}
    />
  );
}

// ---- Reusable stepper control ----
function Stepper({ label, value, unit, onChange, min, max, step }) {
  return (
    <div style={styles.stepperRow}>
      <span style={styles.stepperLabel}>{label}</span>
      <div style={styles.stepperCtrl}>
        <button
          onClick={() => onChange(Math.max(min, value - step))}
          style={styles.stepBtn}
          aria-label={`Decrease ${label}`}
        >
          −
        </button>
        <span style={styles.stepValue}>
          {value}
          {unit}
        </span>
        <button
          onClick={() => onChange(Math.min(max, value + step))}
          style={styles.stepBtn}
          aria-label={`Increase ${label}`}
        >
          +
        </button>
      </div>
    </div>
  );
}
