  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

// ---- Exercise library ----
const LIBRARY = [
  { id: "plank", name: "Plank", duration: 60, cue: "Elbows under shoulders · squeeze glutes · hips level",
    desc: "Face down, prop yourself on your forearms and toes with elbows under your shoulders. Keep your body in one straight line from head to heels and hold — don't let your hips sag or pike up." },
  { id: "bicycle", name: "Bicycle Crunches", duration: 40, cue: "Slow & controlled · elbow to opposite knee",

  { id: "legraise", name: "Leg Raises", duration: 40, cue: "Lower slowly · lower back pressed to floor",

  { id: "mtclimber", name: "Mountain Climbers", duration: 40, cue: "Fast pace · drive knees to chest",
    desc: "Start in a push-up position. Drive one knee toward your chest, then quickly switch legs — like running in place with your hands on the floor. Keep your hips low." },
  { id: "russian", name: "Russian Twists", duration: 40, cue: "Feet up if you can · rotate fully side to side",
    desc: "Sit with knees bent, lean your torso back slightly and lift your feet off the floor if you can. Clasp your hands and rotate your torso side to side, tapping the floor beside each hip." },
  { id: "hollow", name: "Hollow Hold", duration: 40, cue: "Arms & legs extended · lower back glued to floor",
    desc: "Lie on your back and press your lower back into the floor. Lift your shoulders, extended arms, and straight legs a few inches off the ground, forming a shallow banana shape. Hold without letting your back arch." },
  { id: "vups", name: "V-Ups", duration: 40, cue: "Reach hands to toes · keep legs straight",
    desc: "Lie flat with arms extended overhead. In one motion, lift your straight legs and torso to fold into a V, reaching your hands toward your toes, then lower back down with control." },
  { id: "sideplankL", name: "Side Plank (Left)", duration: 30, cue: "Stack shoulders & hips · don't let hips drop",
    desc: "Lie on your left side and prop yourself on your left forearm, elbow under shoulder, feet stacked. Lift your hips so your body forms a straight line and hold." },
  { id: "sideplankR", name: "Side Plank (Right)", duration: 30, cue: "Stack shoulders & hips · don't let hips drop",
    desc: "Lie on your right side and prop yourself on your right forearm, elbow under shoulder, feet stacked. Lift your hips so your body forms a straight line and hold." },
  { id: "flutter", name: "Flutter Kicks", duration: 40, cue: "Small quick kicks · hands under hips for support",
    desc: "Lie on your back with legs extended and lifted slightly, hands under your hips. Kick your legs up and down in small, quick alternating motions without letting them touch the floor." },
  { id: "deadbug", name: "Dead Bug", duration: 40, cue: "Opposite arm & leg · slow · core braced",
    desc: "Lie on your back with arms pointing at the ceiling and knees bent 90°. Slowly lower one arm and the opposite leg toward the floor, return, then switch sides. Keep your lower back pressed down." },
  { id: "revcrunch", name: "Reverse Crunches", duration: 40, cue: "Lift hips off floor · control on the way down",
    desc: "Lie on your back with knees pulled toward your chest. Curl your hips up off the floor, bringing your knees toward your face, then lower slowly with control." },
  { id: "crunches", name: "Crunches", duration: 40, cue: "Chin off chest · lift with abs, not neck",
    desc: "Lie on your back with knees bent, feet flat, hands lightly behind your head. Lift your shoulder blades off the floor using your abs, then lower back down. Don't pull on your neck." },
  { id: "heeltaps", name: "Heel Taps", duration: 40, cue: "Shoulders slightly up · reach side to side",
    desc: "Lie on your back with knees bent, feet flat, arms at your sides. Lift your shoulders slightly and reach side to side, tapping each heel with your hand." },
  { id: "toetouch", name: "Toe Touches", duration: 40, cue: "Legs vertical · reach up toward toes",
    desc: "Lie on your back with legs raised straight up. Reach your hands toward your toes, lifting your shoulder blades off the floor, then lower back down with control." },
];
const byId = (id) => LIBRARY.find((e) => e.id === id);

// Preset exercise entries are either a plain id string or { id, duration }
// when the duration was customized away from the library default.
const resolveEntry = (entry) => {
  const ex = byId(typeof entry === "string" ? entry : entry.id);
  if (!ex) return null;
  return typeof entry === "string" || entry.duration == null
    ? ex
    : { ...ex, duration: entry.duration };
};

// ---- Built-in presets ----
const BUILTIN_PRESETS = [
  {
    id: "classic",
    name: "Classic Circuit",
    exercises: ["plank", "bicycle", "legraise", "mtclimber", "russian"],
    rest: 20,
    roundRest: 75,
    rounds: 3,
  },
  {
    id: "burner",
    name: "Core Burner",
    exercises: ["hollow", "vups", "sideplankL", "sideplankR", "flutter", "plank"],
    rest: 15,
    roundRest: 90,
    rounds: 3,
  },
  {
    id: "quick",
    name: "Quick Hit",
    exercises: ["deadbug", "crunches", "heeltaps", "revcrunch"],
    rest: 20,
    roundRest: 60,
    rounds: 2,
  },
];

const GET_READY = 10;
const STORAGE_KEY = "abs-timer-custom-presets";
const ROW_H = 56; // fixed row height for drag math

// ==== FIREBASE CONFIG ======================================================
// Web-app config from the Firebase console (Project settings → Your apps →
// SDK setup and configuration → Config). This config is a public identifier,
// not a secret — data is protected by Firestore security rules.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBIvfz9QoQpD1iaY6OXAYygZ6_MmGlEPnE",
  authDomain: "abs-timer.firebaseapp.com",
  projectId: "abs-timer",
  storageBucket: "abs-timer.firebasestorage.app",
  messagingSenderId: "356912989096",
  appId: "1:356912989096:web:72cf074309c81b5b0a539d",
};
// ===========================================================================
const MERGE_FLAG_PREFIX = "abs-timer-merged-"; // + uid: local→cloud merge done on this device
const LOCAL_DIRTY_KEY = "abs-timer-local-dirty"; // signed-out writes force a re-merge

// True only when the SDK loaded (gstatic reachable) AND a real config was
// pasted AND initialization succeeded. False means every cloud code path is
// skipped and the app behaves exactly like the localStorage-only version.
const firebaseReady = (() => {
  try {
    if (typeof firebase === "undefined" || !firebase.initializeApp) return false;
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf("PASTE_") === 0) return false;
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    return true;
  } catch (e) {
    return false;
  }
})();

// ---- Persistence adapter ----
// Local layer: Claude's artifact storage when available (persists across
// sessions on claude.ai), else the browser's localStorage.
const localGet = async (key) => {
  if (typeof window !== "undefined" && window.storage) {
    try {
      const r = await window.storage.get(key);
      return r && r.value != null ? r.value : null;
    } catch (e) {
      return null; // key doesn't exist yet
    }
  }
  try {
    return window.localStorage.getItem(key);
  } catch (e) {
    return null;
  }
};
const localSet = async (key, value) => {
  if (typeof window !== "undefined" && window.storage) {
    try {
      await window.storage.set(key, value);
      return true;
    } catch (e) {
      /* fall through to localStorage */
    }
  }
  try {
    window.localStorage.setItem(key, value);
    return true;
  } catch (e) {
    return false;
  }
};

// Cloud layer: per-user Firestore docs users/{uid}/data/{key} → { value, updatedAt }.
const cloudUid = () => {
  try {
    const u = firebaseReady ? firebase.auth().currentUser : null;
    return u ? u.uid : null;
  } catch (e) {
    return null;
  }
};
const cloudDoc = (uid, key) =>
  firebase.firestore().collection("users").doc(uid).collection("data").doc(key);

// The store decides cloud vs local itself, so call sites stay unchanged.
// Writes go local-first (never lost, never block the UI), then push to
// Firestore fire-and-forget — an offline Firestore set() doesn't resolve
// until reconnect, so it must not be awaited on the save path.
const store = {
  notify: null, // set by the component: ("syncing"|"synced"|"error") => void
  async get(key) {
    const uid = cloudUid();
    if (uid) {
      try {
        const snap = await cloudDoc(uid, key).get();
        if (snap.exists && snap.data().value != null) {
          const v = snap.data().value;
          await localSet(key, v); // mirror down so sign-out keeps current data
          return v;
        }
      } catch (e) {
        /* cloud unreachable — fall through to local */
      }
    }
    return localGet(key);
  },
  async set(key, value) {
    const ok = await localSet(key, value);
    const uid = cloudUid();
    if (uid) {
      if (store.notify) store.notify("syncing");
      try {
        cloudDoc(uid, key)
          .set({ value: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
          .then(() => {
            if (store.notify) store.notify("synced");
          })
          .catch((e) => {
            // permission-denied = the DB refused us (security rules), not a
            // connectivity problem — surface it distinctly so it's actionable.
            if (store.notify)
              store.notify(e && e.code === "permission-denied" ? "denied" : "error");
          });
      } catch (e) {
        if (store.notify) store.notify(e && e.code === "permission-denied" ? "denied" : "error");
      }
    } else {
      try {
        window.localStorage.setItem(LOCAL_DIRTY_KEY, "1");
      } catch (e) {}
    }
    return ok;
  },
};

// One-time (per device+uid) local→cloud merge, then cloud is source of truth.
// Merge rule: union by preset id; cloud wins on collision; cloud order first,
// local-only presets appended. Signed-out writes set LOCAL_DIRTY_KEY, which
// forces a re-merge so presets created while signed out survive the next
// sign-in. (Signed-out *edits* to an already-synced preset id are superseded
// by the cloud copy on re-merge.)
async function loadPresetsForUser(uid) {
  const parse = (s) => {
    try {
      const a = JSON.parse(s);
      return Array.isArray(a) ? a : [];
    } catch (e) {
      return [];
    }
  };
  let cloudRaw = null;
  try {
    const snap = await cloudDoc(uid, STORAGE_KEY).get();
    if (snap.exists) cloudRaw = snap.data().value;
  } catch (e) {
    // Cloud unreachable: surface the local mirror instead, and don't set the
    // merge flag so the merge retries on a later sign-in.
    const err = new Error("cloud-unavailable");
    err.code = e && e.code;
    err.fallback = parse(await localGet(STORAGE_KEY));
    throw err;
  }
  const cloud = cloudRaw ? parse(cloudRaw) : [];
  let merged = cloud;
  let alreadyMerged = false;
  let localDirty = false;
  try {
    alreadyMerged = window.localStorage.getItem(MERGE_FLAG_PREFIX + uid) === "1";
    localDirty = window.localStorage.getItem(LOCAL_DIRTY_KEY) === "1";
  } catch (e) {}
  if (!alreadyMerged || localDirty) {
    const local = parse(await localGet(STORAGE_KEY));
    const cloudIds = {};
    cloud.forEach((p) => {
      if (p && p.id) cloudIds[p.id] = true;
    });
    const additions = local.filter((p) => p && p.id && !cloudIds[p.id]);
    merged = cloud.concat(additions);
    if (additions.length > 0) {
      // Must succeed before the flag is set, so failed migrations retry.
      try {
        await cloudDoc(uid, STORAGE_KEY).set({
          value: JSON.stringify(merged),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch (e) {
        try {
          await localSet(STORAGE_KEY, JSON.stringify(merged));
        } catch (e2) {}
        const err = new Error("merge-write-failed");
        err.code = e && e.code;
        err.fallback = merged;
        throw err;
      }
    }
    try {
      window.localStorage.setItem(MERGE_FLAG_PREFIX + uid, "1");
      window.localStorage.removeItem(LOCAL_DIRTY_KEY);
    } catch (e) {}
  }
  try {
    await localSet(STORAGE_KEY, JSON.stringify(merged));
  } catch (e) {}
  return merged;
}

let uidCounter = 1;
const withUids = (entries) =>
  entries.map((e) =>
    typeof e === "string"
      ? { uid: `u${uidCounter++}`, exId: e }
      : { uid: `u${uidCounter++}`, exId: e.id, duration: e.duration }
  );

// ---- Phase colors ----
const THEME = {
  ready: { bg: "#1B2432", accent: "#8FA3BF", label: "GET READY" },
  work: { bg: "#1D4ED8", accent: "#BFDBFE", label: "WORK" },
  rest: { bg: "#047857", accent: "#A7F3D0", label: "REST" },
  roundRest: { bg: "#92400E", accent: "#FDE68A", label: "ROUND BREAK" },
  done: { bg: "#111827", accent: "#FDE68A", label: "DONE" },
};

function AbsWorkoutTimer() {
  // ---- Setup flow: home (pick preset) → preview → edit ----
  const [setupView, setSetupView] = useState("home");
  const [workout, setWorkout] = useState(() => withUids(BUILTIN_PRESETS[0].exercises));
  const [restBetween, setRestBetween] = useState(BUILTIN_PRESETS[0].rest);
  const [roundRest, setRoundRest] = useState(BUILTIN_PRESETS[0].roundRest);
  const [totalRounds, setTotalRounds] = useState(BUILTIN_PRESETS[0].rounds);
  const [selectedId, setSelectedId] = useState("classic");
  const [selectedName, setSelectedName] = useState(BUILTIN_PRESETS[0].name);
  const [edited, setEdited] = useState(false);
  const [customPresets, setCustomPresets] = useState([]);
  const [presetName, setPresetName] = useState("");
  const [showLibrary, setShowLibrary] = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [infoUid, setInfoUid] = useState(null); // preview: expanded description row
  const [libInfoId, setLibInfoId] = useState(null); // edit: library exercise info

  // ---- Account / cloud sync state ----
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(!firebaseReady); // no firebase => nothing to wait for
  const [syncState, setSyncState] = useState("idle"); // idle | syncing | synced | error

  // ---- Drag state (commit on drop) ----
  const [dragIndex, setDragIndex] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const dragRef = useRef({ index: null, startY: 0, offset: 0, moved: false });

  // ---- Timer state ----
  const [phase, setPhase] = useState("idle");
  const [round, setRound] = useState(1);
  const [exIndex, setExIndex] = useState(0);
  const [timeLeft, setTimeLeft] = useState(GET_READY);
  const [running, setRunning] = useState(false);
  const [soundOn, setSoundOn] = useState(true);

  const audioCtxRef = useRef(null);
  const wakeLockRef = useRef(null);

  const exercises = workout
    .map((w) => {
      const ex = byId(w.exId);
      if (!ex) return null;
      return {
        ...ex,
        uid: w.uid,
        duration: w.duration != null ? w.duration : ex.duration,
      };
    })
    .filter(Boolean);

  const isCustomSelected = customPresets.some((p) => p.id === selectedId);

  // ---- Auth subscription + sync notifications ----
  useEffect(() => {
    store.notify = (s) => setSyncState(s);
    if (!firebaseReady) {
      return () => {
        store.notify = null;
      };
    }
    let unsub = null;
    try {
      unsub = firebase.auth().onAuthStateChanged(
        (u) => {
          setUser(u);
          setAuthReady(true);
        },
        () => setAuthReady(true)
      );
    } catch (e) {
      setAuthReady(true);
    }
    return () => {
      store.notify = null;
      if (unsub) unsub();
    };
  }, []);

  // ---- Load saved presets (re-runs when the signed-in user changes) ----
  useEffect(() => {
    if (!authReady) return;
    let cancelled = false;
    (async () => {
      try {
        if (user) setSyncState("syncing");
        let presets;
        if (user) {
          presets = await loadPresetsForUser(user.uid); // includes one-time merge
        } else {
          const value = await store.get(STORAGE_KEY);
          presets = value ? JSON.parse(value) : [];
        }
        if (!cancelled) {
          setCustomPresets(presets);
          if (user) setSyncState("synced");
        }
      } catch (e) {
        if (!cancelled) {
          if (e && e.fallback) setCustomPresets(e.fallback);
          if (user) setSyncState(e && e.code === "permission-denied" ? "denied" : "error");
        }
      }
    })();
    return () => {
      cancelled = true;
    };
  }, [authReady, user ? user.uid : null]);

  const signIn = async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
      } catch (e) {
        // Popup blocked (common on mobile) → best-effort redirect fallback.
        // Note: redirect with the default *.firebaseapp.com authDomain is
        // degraded by third-party-cookie blocking in some browsers; popup is
        // the primary path. A user closing the popup is not an error.
        if (
          e &&
          (e.code === "auth/popup-blocked" ||
            e.code === "auth/operation-not-supported-in-this-environment")
        ) {
          await firebase.auth().signInWithRedirect(provider);
        } else if (!e || e.code !== "auth/popup-closed-by-user") {
          setSyncState("error");
        }
      }
    } catch (e) {
      setSyncState("error");
    }
  };

  const signOut = async () => {
    try {
      await firebase.auth().signOut();
    } catch (e) {}
    setSyncState("idle"); // the local mirror already holds the latest data
  };

  const persistPresets = async (presets) => {
    await store.set(STORAGE_KEY, JSON.stringify(presets));
  };

  // ---- Preset / builder actions ----
  const choosePreset = (p) => {
    setWorkout(withUids(p.exercises));
    setRestBetween(p.rest);
    setRoundRest(p.roundRest);
    setTotalRounds(p.rounds);
    setSelectedId(p.id);
    setSelectedName(p.name);
    setEdited(false);
    setSetupView("preview");
  };

  const removeExercise = (uid) => {
    setWorkout((w) => w.filter((item) => item.uid !== uid));
    setEdited(true);
  };

  const addExercise = (id) => {
    setWorkout((w) => [...w, { uid: `u${uidCounter++}`, exId: id }]);
    setEdited(true);
  };

  const changeDuration = (uid, delta) => {
    setWorkout((w) =>
      w.map((item) => {
        if (item.uid !== uid) return item;
        const base = item.duration != null ? item.duration : byId(item.exId).duration;
        return { ...item, duration: Math.max(10, Math.min(180, base + delta)) };
      })
    );
    setEdited(true);
  };

  const currentConfig = () => ({
    exercises: workout.map((w) => {
      const base = byId(w.exId);
      return w.duration == null || (base && w.duration === base.duration)
        ? w.exId
        : { id: w.exId, duration: w.duration };
    }),
    rest: restBetween,
    roundRest,
    rounds: totalRounds,
  });

  const updateExistingPreset = async () => {
    const next = customPresets.map((p) =>
      p.id === selectedId ? { ...p, ...currentConfig() } : p
    );
    setCustomPresets(next);
    await persistPresets(next);
    setEdited(false);
    setSaveMsg(`Updated "${selectedName}"`);
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const saveAsNewPreset = async () => {
    const name = presetName.trim();
    if (!name || workout.length === 0) return;
    const preset = {
      id: `custom-${Date.now()}`,
      name,
      ...currentConfig(),
      custom: true,
    };
    const next = [...customPresets, preset];
    setCustomPresets(next);
    await persistPresets(next);
    setSelectedId(preset.id);
    setSelectedName(name);
    setEdited(false);
    setPresetName("");
    setSaveMsg(`Saved "${name}"`);
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const deletePreset = async (id) => {
    const next = customPresets.filter((p) => p.id !== id);
    setCustomPresets(next);
    await persistPresets(next);
  };

  // ---- Drag to reorder: visual shift while dragging, commit once on drop ----
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const dragTarget =
    dragIndex === null
      ? null
      : clamp(dragIndex + Math.round(dragOffset / ROW_H), 0, workout.length - 1);

  const onDragMove = useCallback((e) => {
    const d = dragRef.current;
    if (d.index === null) return;
    e.preventDefault();
    d.offset = e.clientY - d.startY;
    if (Math.abs(d.offset) > 4) d.moved = true;
    setDragOffset(d.offset);
  }, []);

  const onDragEnd = useCallback(() => {
    const d = dragRef.current;
    if (d.index !== null) {
      setWorkout((w) => {
        const from = d.index;
        const to = clamp(from + Math.round(d.offset / ROW_H), 0, w.length - 1);
        if (from === to) return w;
        const next = [...w];
        const [item] = next.splice(from, 1);
        next.splice(to, 0, item);
        return next;
      });
      if (d.moved) setEdited(true);
    }
    dragRef.current = { index: null, startY: 0, offset: 0, moved: false };
    setDragIndex(null);
    setDragOffset(0);
    window.removeEventListener("pointermove", onDragMove);
    window.removeEventListener("pointerup", onDragEnd);
    window.removeEventListener("pointercancel", onDragEnd);
  }, [onDragMove]);

  const onDragStart = (e, i) => {
    e.preventDefault();
    dragRef.current = { index: i, startY: e.clientY, offset: 0, moved: false };
    setDragIndex(i);
    setDragOffset(0);
    window.addEventListener("pointermove", onDragMove, { passive: false });
    window.addEventListener("pointerup", onDragEnd);
    window.addEventListener("pointercancel", onDragEnd);
  };

  useEffect(() => {
    return () => {
      window.removeEventListener("pointermove", onDragMove);
      window.removeEventListener("pointerup", onDragEnd);
      window.removeEventListener("pointercancel", onDragEnd);
    };
  }, [onDragMove, onDragEnd]);

  // Compute the visual shift of a non-dragged row while a drag is active
  const rowShift = (i) => {
    if (dragIndex === null || dragTarget === null || i === dragIndex) return 0;
    if (dragIndex < dragTarget && i > dragIndex && i <= dragTarget) return -ROW_H;
    if (dragIndex > dragTarget && i >= dragTarget && i < dragIndex) return ROW_H;
    return 0;
  };

  // ---- Audio beeps ----
  const beep = useCallback(
    (freq = 880, ms = 120) => {
      if (!soundOn) return;
      try {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioCtxRef.current;
        if (ctx.state === "suspended") ctx.resume();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + ms / 1000);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + ms / 1000);
      } catch (e) {
        /* audio unavailable */
      }
    },
    [soundOn]
  );

  // ---- Keep screen awake while running (best-effort) ----
  useEffect(() => {
    const requestWakeLock = async () => {
      try {
        if (running && "wakeLock" in navigator) {
          wakeLockRef.current = await navigator.wakeLock.request("screen");
        }
      } catch (e) {
        /* not supported / denied */
      }
    };
    if (running) requestWakeLock();
    return () => {
      if (wakeLockRef.current) {
        wakeLockRef.current.release().catch(() => {});
        wakeLockRef.current = null;
      }
    };
  }, [running]);

  // ---- Phase transition logic ----
  const advance = useCallback(() => {
    if (phase === "ready") {
      setPhase("work");
      setTimeLeft(exercises[0].duration);
      beep(1200, 300);
      return;
    }
    if (phase === "work") {
      const isLastExercise = exIndex === exercises.length - 1;
      const isLastRound = round === totalRounds;
      if (isLastExercise && isLastRound) {
        setPhase("done");
        setRunning(false);
        beep(1400, 500);
        return;
      }
      if (isLastExercise) {
        setPhase("roundRest");
        setTimeLeft(roundRest);
        beep(600, 250);
        return;
      }
      setPhase("rest");
      setTimeLeft(restBetween);
      beep(600, 250);
      return;
    }
    if (phase === "rest") {
      const next = exIndex + 1;
      setExIndex(next);
      setPhase("work");
      setTimeLeft(exercises[next].duration);
      beep(1200, 300);
      return;
    }
    if (phase === "roundRest") {
      setRound((r) => r + 1);
      setExIndex(0);
      setPhase("work");
      setTimeLeft(exercises[0].duration);
      beep(1200, 300);
    }
  }, [phase, exIndex, round, totalRounds, restBetween, roundRest, exercises, beep]);

  // ---- Tick ----
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) return 0;
        if (t <= 4) beep(880, 100);
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [running, beep]);

  useEffect(() => {
    if (running && timeLeft === 0 && phase !== "done" && phase !== "idle") {
      advance();
    }
  }, [timeLeft, running, phase, advance]);

  // ---- Controls ----
  const start = () => {
    if (exercises.length === 0) return;
    setPhase("ready");
    setRound(1);
    setExIndex(0);
    setTimeLeft(GET_READY);
    setRunning(true);
    beep(880, 150);
  };
  const togglePause = () => setRunning((r) => !r);
  const skip = () => setTimeLeft(0);
  const reset = () => {
    setRunning(false);
    setPhase("idle");
    setRound(1);
    setExIndex(0);
    setTimeLeft(GET_READY);
  };
  const goBack = () => {
    if (phase === "ready") {
      setTimeLeft(GET_READY);
      return;
    }
    if (phase === "rest") {
      setPhase("work");
      setTimeLeft(exercises[exIndex].duration);
      return;
    }
    if (phase === "roundRest") {
      const last = exercises.length - 1;
      setExIndex(last);
      setPhase("work");
      setTimeLeft(exercises[last].duration);
      return;
    }
    if (phase === "work") {
      if (exIndex > 0) {
        const prev = exIndex - 1;
        setExIndex(prev);
        setTimeLeft(exercises[prev].duration);
      } else if (round > 1) {
        const last = exercises.length - 1;
        setRound((r) => r - 1);
        setExIndex(last);
        setTimeLeft(exercises[last].duration);
      } else {
        setTimeLeft(exercises[0].duration);
      }
    }
  };

  // ---- Derived display values ----
  const theme = THEME[phase] || THEME.ready;
  const currentEx = exercises[exIndex];
  const nextEx =
    phase === "ready"
      ? exercises[0]
      : phase === "rest"
      ? exercises[exIndex + 1]
      : phase === "roundRest"
      ? exercises[0]
      : phase === "work" && exIndex < exercises.length - 1
      ? exercises[exIndex + 1]
      : null;

  const phaseTotal =
    phase === "ready"
      ? GET_READY
      : phase === "work"
      ? currentEx.duration
      : phase === "rest"
      ? restBetween
      : phase === "roundRest"
      ? roundRest
      : 1;
  const progress = 1 - timeLeft / phaseTotal;

  const fmt = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  const totalWorkoutSecs =
    GET_READY +
    totalRounds * exercises.reduce((a, e) => a + e.duration, 0) +
    totalRounds * Math.max(0, exercises.length - 1) * restBetween +
    (totalRounds - 1) * roundRest;
  const totalMins = Math.max(1, Math.round(totalWorkoutSecs / 60));

  const allPresets = [...BUILTIN_PRESETS, ...customPresets];

  // ================= HOME: PICK A PRESET =================
  if (phase === "idle" && setupView === "home") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <div style={styles.eyebrow}>ABS CIRCUIT</div>
          <h1 style={styles.setupTitle}>Pick your workout.</h1>

          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {allPresets.map((p) => {
              const exs = p.exercises.map(resolveEntry).filter(Boolean);
              const mins = Math.max(
                1,
                Math.round(
                  (GET_READY +
                    p.rounds * exs.reduce((a, e) => a + e.duration, 0) +
                    p.rounds * Math.max(0, exs.length - 1) * p.rest +
                    (p.rounds - 1) * p.roundRest) /
                    60
                )
              );
              return (
                <div key={p.id} style={styles.presetCard} onClick={() => choosePreset(p)}>
                  <div style={{ flex: 1 }}>
                    <div style={styles.presetCardName}>
                      {p.name}
                      {p.custom && <span style={styles.customBadge}>YOURS</span>}
                    </div>
                    <div style={styles.presetCardMeta}>
                      {exs.length} exercises · {p.rounds} rounds · ~{mins} min
                    </div>
                  </div>
                  {p.custom && (
                    <button
                      onClick={(e) => {
                        e.stopPropagation();
                        deletePreset(p.id);
                      }}
                      style={styles.cardDelete}
                      aria-label={`Delete preset ${p.name}`}
                    >
                      ×
                    </button>
                  )}
                  <span style={styles.presetArrow}>›</span>
                </div>
              );
            })}
          </div>

          {firebaseReady && (
            <div style={styles.accountRow}>
              {user ? (
                <React.Fragment>
                  {user.photoURL && (
                    <img
                      src={user.photoURL}
                      alt=""
                      referrerPolicy="no-referrer"
                      style={styles.accountPhoto}
                    />
                  )}
                  <span style={styles.accountName}>{user.displayName || user.email}</span>
                  <span
                    style={{
                      ...styles.syncHint,
                      color:
                        syncState === "error" || syncState === "denied"
                          ? "#FCA5A5"
                          : "#5F7290",
                    }}
                  >
                    {syncState === "syncing"
                      ? "Syncing…"
                      : syncState === "denied"
                      ? "Sync blocked — publish the database rules"
                      : syncState === "error"
                      ? "Offline — saved on this device"
                      : "Synced"}
                  </span>
                  <button onClick={signOut} style={styles.signOutLink}>
                    Sign out
                  </button>
                </React.Fragment>
              ) : (
                <button onClick={signIn} style={styles.accountBtn}>
                  Sign in with Google to sync your presets
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ================= PREVIEW: PRESET DETAILS + START =================
  if (phase === "idle" && setupView === "preview") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <button onClick={() => setSetupView("home")} style={styles.backLink}>
            ‹ All workouts
          </button>
          <h1 style={{ ...styles.setupTitle, marginBottom: 6 }}>
            {selectedName}
            {edited && <span style={styles.editedTag}> · edited</span>}
          </h1>
          <div style={styles.previewMeta}>
            {exercises.length} exercises · {totalRounds} rounds · ~{totalMins} min
          </div>
          <div style={styles.previewHint}>Tap an exercise to see how it's done</div>

          <div style={{ ...styles.exList, marginTop: 20 }}>
            {exercises.map((ex, i) => (
              <React.Fragment key={ex.uid}>
                <div
                  style={{ ...styles.previewRow, cursor: "pointer" }}
                  onClick={() => setInfoUid(infoUid === ex.uid ? null : ex.uid)}
                >
                  <span style={styles.previewIndex}>{i + 1}</span>
                  <span style={styles.exName}>
                    {ex.name}
                    <span style={styles.infoIcon}>{infoUid === ex.uid ? "▾" : "ⓘ"}</span>
                  </span>
                  <span style={styles.exDur}>{ex.duration}s</span>
                </div>
                {infoUid === ex.uid && <div style={styles.descBox}>{ex.desc}</div>}
              </React.Fragment>
            ))}
          </div>

          <div style={styles.previewTiming}>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{restBetween}s</span>
              <span style={styles.timingLabel}>rest between exercises</span>
            </div>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{roundRest}s</span>
              <span style={styles.timingLabel}>rest between rounds</span>
            </div>
            <div style={styles.timingItem}>
              <span style={styles.timingValue}>{totalRounds}</span>
              <span style={styles.timingLabel}>rounds</span>
            </div>
          </div>

          <button onClick={start} style={styles.startBtn}>
            START WORKOUT
          </button>
          <button
            onClick={() => {
              setLibInfoId(null);
              setSetupView("edit");
            }}
            style={styles.editBtn}
          >
            Edit workout
          </button>
        </div>
      </div>
    );
  }

  // ================= EDIT MODE: BUILDER WITH DRAG REORDER =================
  if (phase === "idle" && setupView === "edit") {
    return (
      <div style={{ ...styles.screen, background: "#0F1520" }}>
        <div style={styles.setupWrap}>
          <button onClick={() => setSetupView("preview")} style={styles.backLink}>
            ‹ Done editing
          </button>
          <h1 style={{ ...styles.setupTitle, marginBottom: 6 }}>Edit workout</h1>
          <div style={styles.previewMeta}>
            Hold ⠿ and drag to reorder · − / + to adjust time · tap × to remove
          </div>

          <div style={styles.sectionLabel}>EXERCISES</div>
          <div style={styles.exList}>
            {exercises.length === 0 && (
              <div style={{ padding: "16px 0", color: "#8FA3BF", fontSize: 15 }}>
                No exercises yet — add some below.
              </div>
            )}
            {exercises.map((ex, i) => {
              const isDragging = dragIndex === i;
              const shift = rowShift(i);
              return (
                <div
                  key={ex.uid}
                  style={{
                    ...styles.exRow,
                    height: ROW_H,
                    boxSizing: "border-box",
                    transform: isDragging
                      ? `translateY(${dragOffset}px) scale(1.02)`
                      : `translateY(${shift}px)`,
                    transition: isDragging ? "none" : "transform 0.18s ease",
                    background: isDragging ? "#1E2C48" : "transparent",
                    boxShadow: isDragging ? "0 8px 24px rgba(0,0,0,0.55)" : "none",
                    borderRadius: isDragging ? 12 : 0,
                    borderBottom: isDragging ? "1px solid transparent" : "1px solid #26324A",
                    position: "relative",
                    zIndex: isDragging ? 10 : 1,
                  }}
                >
                  <div
                    onPointerDown={(e) => onDragStart(e, i)}
                    style={styles.dragHandle}
                    aria-label={`Drag to reorder ${ex.name}`}
                  >
                    ⠿
                  </div>
                  <span style={styles.exName}>{ex.name}</span>
                  <button
                    onClick={() => changeDuration(ex.uid, -5)}
                    style={styles.durBtn}
                    aria-label={`Decrease ${ex.name} time`}
                  >
                    −
                  </button>
                  <span style={{ ...styles.exDur, minWidth: 36, textAlign: "center" }}>
                    {ex.duration}s
                  </span>
                  <button
                    onClick={() => changeDuration(ex.uid, 5)}
                    style={styles.durBtn}
                    aria-label={`Increase ${ex.name} time`}
                  >
                    +
                  </button>
                  <button
                    onClick={() => removeExercise(ex.uid)}
                    style={styles.removeBtn}
                    aria-label={`Remove ${ex.name}`}
                  >
                    ×
                  </button>
                </div>
              );
            })}
          </div>

          <button
            onClick={() => {
              setShowLibrary((s) => !s);
              setLibInfoId(null);
            }}
            style={styles.addToggle}
          >
            {showLibrary ? "− Hide exercise library" : "+ Add exercises"}
          </button>
          {showLibrary && (
            <div style={styles.libraryGrid}>
              {LIBRARY.map((ex) => (
                <React.Fragment key={ex.id}>
                  <div style={styles.libChip}>
                    <button
                      onClick={() => addExercise(ex.id)}
                      style={styles.libAdd}
                      aria-label={`Add ${ex.name}`}
                    >
                      + {ex.name} <span style={{ color: "#5B8DEF" }}>{ex.duration}s</span>
                    </button>
                    <button
                      onClick={() => setLibInfoId(libInfoId === ex.id ? null : ex.id)}
                      style={{
                        ...styles.libInfo,
                        color: libInfoId === ex.id ? "#5B8DEF" : "#8FA3BF",
                      }}
                      aria-label={`About ${ex.name}`}
                      aria-expanded={libInfoId === ex.id}
                      aria-controls={`lib-desc-${ex.id}`}
                    >
                      {libInfoId === ex.id ? "▾" : "ⓘ"}
                    </button>
                  </div>
                  {libInfoId === ex.id && (
                    <div id={`lib-desc-${ex.id}`} style={styles.libDescBox}>
                      <strong>{ex.name}</strong> — {ex.desc}
                    </div>
                  )}
                </React.Fragment>
              ))}
            </div>
          )}

          <div style={styles.sectionLabel}>TIMING</div>
          <Stepper
            label="Rest between exercises"
            value={restBetween}
            unit="s"
            onChange={(v) => {
              setRestBetween(v);
              setEdited(true);
            }}
            min={5}
            max={60}
            step={5}
          />
          <Stepper
            label="Rest between rounds"
            value={roundRest}
            unit="s"
            onChange={(v) => {
              setRoundRest(v);
              setEdited(true);
            }}
            min={30}
            max={180}
            step={15}
          />
          <Stepper
            label="Rounds"
            value={totalRounds}
            unit=""
            onChange={(v) => {
              setTotalRounds(v);
              setEdited(true);
            }}
            min={1}
            max={5}
            step={1}
          />

          <div style={styles.sectionLabel}>SAVE</div>
          {isCustomSelected && (
            <button
              onClick={updateExistingPreset}
              disabled={!edited || exercises.length === 0}
              style={{
                ...styles.updateBtn,
                opacity: !edited || exercises.length === 0 ? 0.4 : 1,
              }}
            >
              Update "{selectedName}"
            </button>
          )}
          <div style={{ ...styles.saveRow, marginTop: isCustomSelected ? 10 : 0 }}>
            <input
              value={presetName}
              onChange={(e) => setPresetName(e.target.value)}
              placeholder="Save as new preset…"
              style={styles.saveInput}
            />
            <button
              onClick={saveAsNewPreset}
              disabled={!presetName.trim() || exercises.length === 0}
              style={{
                ...styles.saveBtn,
                opacity: !presetName.trim() || exercises.length === 0 ? 0.4 : 1,
              }}
            >
              Save
            </button>
          </div>
          {saveMsg && <div style={styles.saveMsg}>{saveMsg}</div>}

          <button
            onClick={() => setSetupView("preview")}
            disabled={exercises.length === 0}
            style={{ ...styles.startBtn, opacity: exercises.length === 0 ? 0.4 : 1 }}
          >
            DONE · ~{totalMins} MIN
          </button>
        </div>
      </div>
    );
  }

  // ================= DONE SCREEN =================
  if (phase === "done") {
    return (
      <div style={{ ...styles.screen, background: THEME.done.bg }}>
        <div style={styles.doneWrap}>
          <div style={{ fontSize: 72 }}>💪</div>
          <h1 style={styles.doneTitle}>Workout complete</h1>
          <p style={styles.doneSub}>
            {selectedName} · {totalRounds} rounds · {totalRounds * exercises.length} sets · ~
            {totalMins} min
          </p>
          <button
            onClick={() => {
              reset();
              setSetupView("preview");
            }}
            style={{ ...styles.startBtn, marginTop: 32 }}
          >
            GO AGAIN
          </button>
          <button
            onClick={() => {
              reset();
              setSetupView("home");
            }}
            style={styles.editBtn}
          >
            All workouts
          </button>
        </div>
      </div>
    );
  }

  // ================= ACTIVE TIMER SCREEN =================
  return (
    <div style={{ ...styles.screen, background: theme.bg, transition: "background 0.4s ease" }}>
      <div style={styles.topBar}>
        <span style={{ ...styles.phaseTag, color: theme.accent }}>{theme.label}</span>
        <span style={{ ...styles.roundTag, color: theme.accent }}>
          ROUND {round}/{totalRounds}
        </span>
        <button
          onClick={() => setSoundOn((s) => !s)}
          style={{ ...styles.iconBtn, color: theme.accent }}
          aria-label={soundOn ? "Mute sounds" : "Unmute sounds"}
        >
          {soundOn ? "🔊" : "🔇"}
        </button>
      </div>

      <div style={styles.centerBlock}>
        <div style={styles.exerciseName}>
          {phase === "work" ? currentEx.name : phase === "ready" ? "Get in position" : "Breathe"}
        </div>
        {phase === "work" && (
          <div style={{ ...styles.cue, color: theme.accent }}>{currentEx.cue}</div>
        )}

        <div style={styles.bigTime}>{fmt(timeLeft)}</div>

        <div style={styles.progressTrack}>
          <div
            style={{
              ...styles.progressFill,
              width: `${progress * 100}%`,
              background: theme.accent,
            }}
          />
        </div>

        <div style={styles.dots}>
          {exercises.map((ex, i) => (
            <div
              key={ex.uid}
              style={{
                ...styles.dot,
                background:
                  i < exIndex || (i === exIndex && phase !== "ready")
                    ? theme.accent
                    : "rgba(255,255,255,0.25)",
              }}
            />
          ))}
        </div>

        {nextEx && (
          <div style={{ ...styles.upNext, color: theme.accent }}>
            UP NEXT — {nextEx.name} · {nextEx.duration}s
          </div>
        )}
      </div>

      <div style={styles.controls}>
        <button onClick={running ? goBack : reset} style={styles.ctrlBtnSecondary}>
          {running ? "Back" : "Reset"}
        </button>
        <button onClick={togglePause} style={styles.ctrlBtnPrimary}>
          {running ? "Pause" : "Resume"}
        </button>
        <button onClick={skip} style={styles.ctrlBtnSecondary}>
          Skip
        </button>
      </div>
    </div>
  );
}

// ---- Reusable stepper control ----
function Stepper({ label, value, unit, onChange, min, max, step }) {
  return (
    <div style={styles.stepperRow}>
      <span style={styles.stepperLabel}>{label}</span>
      <div style={styles.stepperCtrl}>
        <button
          onClick={() => onChange(Math.max(min, value - step))}
          style={styles.stepBtn}
          aria-label={`Decrease ${label}`}
        >
          −
        </button>
        <span style={styles.stepValue}>
          {value}
          {unit}
        </span>
        <button
          onClick={() => onChange(Math.min(max, value + step))}
          style={styles.stepBtn}
          aria-label={`Increase ${label}`}
        >
          +
        </button>
      </div>
    </div>
  );
}
